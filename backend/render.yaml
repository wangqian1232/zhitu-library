services:
  - type: web
    name: zhitu-library-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/library-backend-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
