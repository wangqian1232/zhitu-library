<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧图书馆运营数据监控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0e1a;
        --bg-secondary: #111827;
        --bg-card: rgba(17, 24, 39, 0.65);
        --border-color: rgba(59, 130, 246, 0.15);
        --border-glow: rgba(6, 182, 212, 0.25);
        --accent-blue: #3b82f6;
        --accent-cyan: #06b6d4;
        --accent-orange: #f97316;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-purple: #8b5cf6;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --card-radius: 12px;
        --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family:
          "Inter",
          "Microsoft YaHei",
          "PingFang SC",
          -apple-system,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(59, 130, 246, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(6, 182, 212, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 80%,
            rgba(139, 92, 246, 0.04) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      #particles-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 32px;
        background: rgba(10, 14, 26, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        position: relative;
        z-index: 10;
      }

      .header::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent-cyan),
          var(--accent-blue),
          transparent
        );
        opacity: 0.5;
      }

      .header-title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #60a5fa, #06b6d4, #a78bfa);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradientShift 4s ease infinite;
      }

      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .header-time {
        font-size: 14px;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-time::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-green);
        box-shadow: 0 0 8px var(--accent-green);
        animation: pulse 2s ease-in-out infinite;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .fullscreen-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: rgba(10, 14, 26, 0.6);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .fullscreen-btn:hover {
        background: rgba(59, 130, 246, 0.15);
        border-color: var(--border-glow);
        color: var(--accent-cyan);
        transform: scale(1.05);
      }

      .fullscreen-btn:active {
        transform: scale(0.95);
      }

      .fullscreen-btn svg {
        width: 18px;
        height: 18px;
      }

      :fullscreen .header {
        padding: 20px 40px;
      }

      :fullscreen .dashboard {
        height: calc(100vh - 84px);
        padding: 24px;
        gap: 24px;
      }

      :fullscreen .card {
        padding: 24px;
      }

      :fullscreen .header-title {
        font-size: 28px;
      }

      :fullscreen .stat-value {
        font-size: 34px;
      }

      :fullscreen .chart-container {
        height: 260px;
      }

      :fullscreen .chart-container.large {
        height: 380px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      .dashboard {
        display: grid;
        grid-template-columns: 25% 50% 25%;
        gap: 20px;
        padding: 20px;
        height: calc(100vh - 72px);
        position: relative;
        z-index: 1;
      }

      @media (min-width: 1920px) {
        .dashboard {
          gap: 24px;
          padding: 24px;
        }
        .card {
          padding: 24px;
        }
        .chart-container {
          height: 260px;
        }
        .chart-container.large {
          height: 380px;
        }
        .stat-value {
          font-size: 34px;
        }
        .header-title {
          font-size: 28px;
        }
        .ranking-list {
          max-height: 320px;
        }
        .recent-logs-container {
          max-height: 300px;
        }
      }

      @media (min-width: 2560px) {
        .dashboard {
          gap: 28px;
          padding: 32px;
          height: calc(100vh - 80px);
        }
        .header {
          padding: 20px 48px;
        }
        .header-title {
          font-size: 32px;
        }
        .card {
          padding: 28px;
        }
        .chart-container {
          height: 320px;
        }
        .chart-container.large {
          height: 460px;
        }
        .stat-value {
          font-size: 38px;
          height: 44px;
          line-height: 44px;
        }
        .flip-digit-wrapper {
          width: 24px;
          height: 44px;
        }
        .flip-digit-strip span {
          height: 44px;
          line-height: 44px;
          font-size: 34px;
        }
        .stat-label {
          font-size: 14px;
        }
        .card-title {
          font-size: 17px;
        }
        .ranking-list {
          max-height: 380px;
        }
        .recent-logs-container {
          max-height: 360px;
        }
      }

      .column {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .card {
        background: var(--bg-card);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        border-radius: var(--card-radius);
        padding: 20px;
        position: relative;
        overflow: hidden;
        transition: all var(--transition-normal);
        animation: cardEntrance 0.6s ease-out both;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(6, 182, 212, 0.3),
          transparent
        );
      }

      .card:hover {
        border-color: var(--border-glow);
        box-shadow:
          0 8px 32px rgba(6, 182, 212, 0.1),
          0 0 0 1px rgba(6, 182, 212, 0.1);
        transform: translateY(-2px);
      }

      @keyframes cardEntrance {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .column:nth-child(1) .card:nth-child(1) {
        animation-delay: 0.1s;
      }
      .column:nth-child(1) .card:nth-child(2) {
        animation-delay: 0.2s;
      }
      .column:nth-child(2) .card:nth-child(1) {
        animation-delay: 0.15s;
      }
      .column:nth-child(2) .card:nth-child(2) {
        animation-delay: 0.25s;
      }
      .column:nth-child(3) .card:nth-child(1) {
        animation-delay: 0.2s;
      }
      .column:nth-child(3) .card:nth-child(2) {
        animation-delay: 0.3s;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 16px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 10px;
        letter-spacing: 0.5px;
      }

      .card-title::before {
        content: "";
        width: 3px;
        height: 16px;
        border-radius: 2px;
        background: linear-gradient(
          180deg,
          var(--accent-cyan),
          var(--accent-blue)
        );
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .stat-card {
        background: rgba(10, 14, 26, 0.5);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 16px;
        cursor: pointer;
        transition: all var(--transition-normal);
        position: relative;
        overflow: hidden;
      }

      .stat-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.05),
          transparent
        );
        opacity: 0;
        transition: opacity var(--transition-normal);
      }

      .stat-card:hover {
        transform: translateY(-3px) scale(1.02);
        border-color: var(--border-glow);
        box-shadow: 0 8px 24px rgba(6, 182, 212, 0.15);
      }

      .stat-card:hover::after {
        opacity: 1;
      }

      .stat-value {
        font-size: 30px;
        font-weight: 700;
        color: var(--text-primary);
        transition: all var(--transition-slow);
        font-variant-numeric: tabular-nums;
        position: relative;
        z-index: 1;
        overflow: hidden;
        height: 38px;
        line-height: 38px;
      }

      .stat-value .flip-digit {
        display: inline-block;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .flip-container {
        display: flex;
        justify-content: center;
        gap: 2px;
      }

      .flip-digit-wrapper {
        width: 22px;
        height: 38px;
        overflow: hidden;
        position: relative;
      }

      .flip-digit-strip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .flip-digit-strip span {
        display: block;
        width: 100%;
        height: 38px;
        line-height: 38px;
        text-align: center;
        font-size: 30px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .stat-value.warning {
        color: var(--accent-orange);
        text-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
      }

      .stat-value.flash {
        animation: valueFlash 0.8s ease-out;
      }

      @keyframes valueFlash {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.15);
          color: var(--accent-cyan);
        }
        100% {
          transform: scale(1);
        }
      }

      .stat-label {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
        position: relative;
        z-index: 1;
      }

      .stat-change {
        font-size: 11px;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 3px;
        position: relative;
        z-index: 1;
      }

      .stat-change.up {
        color: var(--accent-green);
      }

      .stat-change.down {
        color: var(--accent-red);
      }

      .chart-container {
        width: 100%;
        height: 220px;
      }

      .chart-container.large {
        height: 320px;
      }

      .trend-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .trend-tab {
        padding: 6px 16px;
        border-radius: 6px;
        background: rgba(10, 14, 26, 0.5);
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all var(--transition-fast);
        letter-spacing: 0.3px;
      }

      .trend-tab.active {
        background: linear-gradient(
          135deg,
          rgba(6, 182, 212, 0.2),
          rgba(59, 130, 246, 0.2)
        );
        color: var(--accent-cyan);
        border-color: var(--accent-cyan);
        box-shadow: 0 0 12px rgba(6, 182, 212, 0.15);
      }

      .trend-tab:hover:not(.active) {
        border-color: var(--border-glow);
        color: var(--text-secondary);
      }

      .ranking-list {
        max-height: 280px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(6, 182, 212, 0.2) transparent;
      }

      .ranking-list::-webkit-scrollbar {
        width: 4px;
      }

      .ranking-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .ranking-list::-webkit-scrollbar-thumb {
        background: rgba(6, 182, 212, 0.2);
        border-radius: 2px;
      }

      .ranking-item {
        display: flex;
        align-items: center;
        padding: 12px 10px;
        border-radius: 8px;
        margin-bottom: 4px;
        transition: all var(--transition-fast);
        cursor: default;
      }

      .ranking-item:hover {
        background: rgba(59, 130, 246, 0.08);
        transform: translateX(4px);
      }

      .ranking-rank {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        margin-right: 12px;
        flex-shrink: 0;
      }

      .ranking-rank.gold {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #1a1a2e;
        box-shadow: 0 2px 8px rgba(251, 191, 36, 0.3);
      }

      .ranking-rank.silver {
        background: linear-gradient(135deg, #d1d5db, #9ca3af);
        color: #1a1a2e;
        box-shadow: 0 2px 8px rgba(156, 163, 175, 0.3);
      }

      .ranking-rank.bronze {
        background: linear-gradient(135deg, #d97706, #b45309);
        color: #fff;
        box-shadow: 0 2px 8px rgba(217, 119, 6, 0.3);
      }

      .ranking-rank.normal {
        background: rgba(30, 41, 59, 0.6);
        color: var(--text-muted);
        border: 1px solid var(--border-color);
      }

      .ranking-info {
        flex: 1;
        min-width: 0;
      }

      .ranking-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .ranking-author {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .ranking-count {
        font-size: 14px;
        font-weight: 700;
        color: var(--accent-blue);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .recent-logs-container {
        max-height: 260px;
        overflow: hidden;
        position: relative;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .recent-logs-container::-webkit-scrollbar {
        display: none;
      }

      .recent-logs-container::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: linear-gradient(transparent, var(--bg-card));
        pointer-events: none;
        z-index: 2;
      }

      .recent-logs-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 30px;
        background: linear-gradient(var(--bg-card), transparent);
        pointer-events: none;
        z-index: 2;
      }

      .recent-logs-scroll {
        animation: scrollUp var(--scroll-speed, 25s) linear infinite;
      }

      .recent-logs-container:hover .recent-logs-scroll {
        animation-play-state: paused;
      }

      @keyframes scrollUp {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-50%);
        }
      }

      .log-item {
        display: flex;
        align-items: center;
        padding: 10px 8px;
        border-bottom: 1px solid rgba(59, 130, 246, 0.08);
        transition: background var(--transition-fast);
      }

      .log-item:hover {
        background: rgba(59, 130, 246, 0.05);
      }

      .log-user {
        flex: 1;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-primary);
      }

      .log-book {
        flex: 1.5;
        font-size: 12px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .log-time {
        font-size: 11px;
        color: var(--text-muted);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .log-status {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        margin-left: 8px;
        flex-shrink: 0;
        font-weight: 500;
      }

      .log-status.active {
        background: rgba(59, 130, 246, 0.15);
        color: var(--accent-blue);
      }

      .log-status.returned {
        background: rgba(16, 185, 129, 0.15);
        color: var(--accent-green);
      }

      /* Skeleton Loading */
      .skeleton {
        position: relative;
        overflow: hidden;
        border-radius: 6px;
      }

      .skeleton::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(59, 130, 246, 0.08),
          transparent
        );
        animation: shimmer 1.5s ease-in-out infinite;
      }

      @keyframes shimmer {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }

      .skeleton-stat {
        height: 60px;
        background: rgba(30, 41, 59, 0.4);
        border-radius: 10px;
      }

      .skeleton-chart {
        height: 220px;
        background: rgba(30, 41, 59, 0.4);
        border-radius: 10px;
      }

      .skeleton-chart.large {
        height: 320px;
      }

      .skeleton-list-item {
        height: 44px;
        background: rgba(30, 41, 59, 0.4);
        border-radius: 8px;
        margin-bottom: 6px;
      }

      .skeleton-text {
        height: 14px;
        background: rgba(30, 41, 59, 0.4);
        border-radius: 4px;
        margin-bottom: 8px;
      }

      .skeleton-text.short {
        width: 60%;
      }

      /* Data update indicator */
      .update-indicator {
        position: fixed;
        top: 80px;
        right: 20px;
        padding: 8px 16px;
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 8px;
        color: var(--accent-green);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        transform: translateY(-10px);
        transition: all var(--transition-normal);
        z-index: 100;
        pointer-events: none;
      }

      .update-indicator.show {
        opacity: 1;
        transform: translateY(0);
      }

      .update-indicator::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-green);
        animation: pulse 1s ease-in-out infinite;
      }

      /* Responsive */
      @media (max-width: 1400px) {
        .dashboard {
          grid-template-columns: 30% 40% 30%;
        }
      }

      @media (max-width: 1024px) {
        .dashboard {
          grid-template-columns: 1fr;
          height: auto;
        }
        .header-title {
          font-size: 18px;
        }
      }

      /* Accessibility */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <div class="header" role="banner">
      <h1 class="header-title">智慧图书馆运营数据监控中心</h1>
      <div class="header-actions">
        <div
          class="header-time"
          id="headerTime"
          role="timer"
          aria-label="当前时间"
        ></div>
        <button
          class="fullscreen-btn"
          id="fullscreenBtn"
          onclick="toggleFullscreen()"
          title="全屏显示"
          aria-label="切换全屏显示"
        >
          <svg
            id="fullscreenIcon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 3 21 3 21 9" />
            <polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
        </button>
      </div>
    </div>

    <div

      function updateTime() {
        const now = new Date();
        const weekdays = [
          "星期日",
          "星期一",
          "星期二",
          "星期三",
          "星期四",
          "星期五",
          "星期六",
        ];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const seconds = String(now.getSeconds()).padStart(2, "0");
        const weekday = weekdays[now.getDay()];
        document.getElementById("headerTime").textContent =
          `${year}-${month}-${day} ${hours}:${minutes}:${seconds} ${weekday}`;
      }

      setInterval(updateTime, 1000);
      updateTime();

      async function apiCall(url) {
        try {
          const response = await fetch(API_BASE + url);
          if (!response.ok) return null;
          return await response.json();
        } catch (e) {
          console.error("API Error:", e);
          return null;
        }
      }

      function animateValue(element, start, end, duration) {
        const range = end - start;
        const startTime = performance.now();

        function update(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = Math.round(start + range * eased);
          element.textContent = current;
          if (progress < 1) {
            requestAnimationFrame(update);
          }
        }

        requestAnimationFrame(update);
      }

      function createFlipCounter(value, duration = 800) {
        const strValue = String(value);
        const container = document.createElement("div");
        container.className = "flip-container";

        for (let i = 0; i < strValue.length; i++) {
          const char = strValue[i];
          const wrapper = document.createElement("div");
          wrapper.className = "flip-digit-wrapper";

          const strip = document.createElement("div");
          strip.className = "flip-digit-strip";

          for (let d = 0; d <= 9; d++) {
            const span = document.createElement("span");
            span.textContent = d;
            strip.appendChild(span);
          }

          wrapper.appendChild(strip);
          container.appendChild(wrapper);

          const digit = parseInt(char);
          setTimeout(() => {
            strip.style.transform = `translateY(-${digit * 38}px)`;
          }, i * 60);
        }

        return container;
      }

      function updateFlipCounter(container, newValue) {
        const strValue = String(newValue);
        const wrappers = container.querySelectorAll(".flip-digit-wrapper");

        while (wrappers.length < strValue.length) {
          const wrapper = document.createElement("div");
          wrapper.className = "flip-digit-wrapper";
          const strip = document.createElement("div");
          strip.className = "flip-digit-strip";
          for (let d = 0; d <= 9; d++) {
            const span = document.createElement("span");
            span.textContent = d;
            strip.appendChild(span);
          }
          wrapper.appendChild(strip);
          container.appendChild(wrapper);
        }

        const updatedWrappers = container.querySelectorAll(
          ".flip-digit-wrapper",
        );
        for (let i = 0; i < strValue.length; i++) {
          const digit = parseInt(strValue[i]);
          const strip = updatedWrappers[i].querySelector(".flip-digit-strip");
          strip.style.transform = `translateY(-${digit * 100}%)`;
        }
      }

      // Particle background
      function initParticles() {
        const canvas = document.getElementById("particles-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        const particleCount = 40;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener("resize", resize);

        class Particle {
          constructor() {
            this.reset();
          }
          reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.3 + 0.1;
          }
          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (
              this.x < 0 ||
              this.x > canvas.width ||
              this.y < 0 ||
              this.y > canvas.height
            ) {
              this.reset();
            }
          }
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(59, 130, 246, ${this.opacity})`;
            ctx.fill();
          }
        }

        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.update();
            p.draw();
          });

          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 150) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(59, 130, 246, ${0.05 * (1 - dist / 150)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }
          requestAnimationFrame(animate);
        }

        animate();
      }

      initParticles();
      loadDashboardData();
      setInterval(loadDashboardData, 300000);
    </script>
  </body>
</html>
